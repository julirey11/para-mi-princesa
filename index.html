<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ramo de Girasoles 🌻</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: radial-gradient(circle, #0b0f1a, #000);
  overflow: hidden;
}

/* CONTENEDOR */
.bouquet {
  position: relative;
  width: 300px;
  height: 400px;
}

/* TALLOS */
.stem {
  position: absolute;
  width: 6px;
  height: 200px;
  background: linear-gradient(#2e7d32, #1b5e20);
  bottom: 0;
  left: 50%;
  transform-origin: bottom;
  animation: sway 4s ease-in-out infinite;
}

/* HOJAS */
.leaf {
  position: absolute;
  width: 40px;
  height: 20px;
  background: #2e7d32;
  border-radius: 20px 0;
}

.leaf.left {
  left: -30px;
  bottom: 80px;
  transform: rotate(-30deg);
}

.leaf.right {
  right: -30px;
  bottom: 120px;
  transform: rotate(30deg);
}

/* FLOR */
.flower {
  position: absolute;
  width: 100px;
  height: 100px;
  top: -80px;
  left: 50%;
  transform: translateX(-50%);
}

/* CENTRO */
.center {
  position: absolute;
  width: 35px;
  height: 35px;
  background: radial-gradient(circle, #6b3e1d, #3e260f);
  border-radius: 50%;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 2;
}

/* PETALOS */
.petal {
  position: absolute;
  width: 22px;
  height: 45px;
  background: linear-gradient(#ffd54f, #ffb300);
  border-radius: 50%;
  top: 50%;
  left: 50%;
  transform-origin: center -15px;
}

/* 12 pétalos */
.petal:nth-child(1) { transform: translate(-50%, -50%) rotate(0deg); }
.petal:nth-child(2) { transform: translate(-50%, -50%) rotate(30deg); }
.petal:nth-child(3) { transform: translate(-50%, -50%) rotate(60deg); }
.petal:nth-child(4) { transform: translate(-50%, -50%) rotate(90deg); }
.petal:nth-child(5) { transform: translate(-50%, -50%) rotate(120deg); }
.petal:nth-child(6) { transform: translate(-50%, -50%) rotate(150deg); }
.petal:nth-child(7) { transform: translate(-50%, -50%) rotate(180deg); }
.petal:nth-child(8) { transform: translate(-50%, -50%) rotate(210deg); }
.petal:nth-child(9) { transform: translate(-50%, -50%) rotate(240deg); }
.petal:nth-child(10){ transform: translate(-50%, -50%) rotate(270deg); }
.petal:nth-child(11){ transform: translate(-50%, -50%) rotate(300deg); }
.petal:nth-child(12){ transform: translate(-50%, -50%) rotate(330deg); }

/* ANIMACION */
@keyframes sway {
  0%, 100% { transform: translateX(-50%) rotate(0deg); }
  50% { transform: translateX(-50%) rotate(3deg); }
}

/* POSICION DE CADA FLOR */
.stem:nth-child(1) { left: 50%; }
.stem:nth-child(2) { left: 35%; height: 180px; }
.stem:nth-child(3) { left: 65%; height: 180px; }
.stem:nth-child(4) { left: 25%; height: 160px; }
.stem:nth-child(5) { left: 75%; height: 160px; }

/* TEXTO */
.text {
  position: absolute;
  bottom: -40px;
  width: 100%;
  text-align: center;
  color: white;
  font-size: 22px;
}
</style>
</head>

<body>

<div class="bouquet">

  <!-- TALLO 1 -->
  <div class="stem">
    <div class="flower">
      <div class="center"></div>
      <div class="petal"></div><div class="petal"></div><div class="petal"></div>
      <div class="petal"></div><div class="petal"></div><div class="petal"></div>
      <div class="petal"></div><div class="petal"></div><div class="petal"></div>
      <div class="petal"></div><div class="petal"></div><div class="petal"></div>
    </div>
    <div class="leaf left"></div>
    <div class="leaf right"></div>
  </div>

  <!-- TALLO 2 -->
  <div class="stem">
    <div class="flower">
      <div class="center"></div>
      <div class="petal"></div><div class="petal"></div><div class="petal"></div>
      <div class="petal"></div><div class="petal"></div><div class="petal"></div>
      <div class="petal"></div><div class="petal"></div><div class="petal"></div>
      <div class="petal"></div><div class="petal"></div><div class="petal"></div>
    </div>
  </div>

  <!-- TALLO 3 -->
  <div class="stem">
    <div class="flower">
      <div class="center"></div>
      <div class="petal"></div><div class="petal"></div><div class="petal"></div>
      <div class="petal"></div><div class="petal"></div><div class="petal"></div>
      <div class="petal"></div><div class="petal"></div><div class="petal"></div>
      <div class="petal"></div><div class="petal"></div><div class="petal"></div>
    </div>
  </div>

  <!-- TALLO 4 -->
  <div class="stem">
    <div class="flower">
      <div class="center"></div>
      <div class="petal"></div><div class="petal"></div><div class="petal"></div>
      <div class="petal"></div><div class="petal"></div><div class="petal"></div>
      <div class="petal"></div><div class="petal"></div><div class="petal"></div>
      <div class="petal"></div><div class="petal"></div><div class="petal"></div>
    </div>
  </div>

  <!-- TALLO 5 -->
  <div class="stem">
    <div class="flower">
      <div class="center"></div>
      <div class="petal"></div><div class="petal"></div><div class="petal"></div>
      <div class="petal"></div><div class="petal"></div><div class="petal"></div>
      <div class="petal"></div><div class="petal"></div><div class="petal"></div>
      <div class="petal"></div><div class="petal"></div><div class="petal"></div>
    </div>
  </div>

  <div class="text">Para ti 🌻💛</div>

</div>

</body>
</html>
