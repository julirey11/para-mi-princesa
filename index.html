<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Galaxia de Girasoles 🌻</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  overflow: hidden;
  background: radial-gradient(circle at center, #0b0f1a, #000);
  height: 100vh;
  touch-action: none;
}

/* CONTENEDOR */
.galaxy {
  position: absolute;
  width: 200vw;
  height: 200vh;
  transform: translate(-50%, -50%);
  top: 50%;
  left: 50%;
  transition: transform 0.1s ease-out;
}

/* GIRASOL */
.sunflower {
  position: absolute;
  width: 60px;
  height: 60px;
}

/* CENTRO */
.center {
  position: absolute;
  width: 20px;
  height: 20px;
  background: #5a3e1b;
  border-radius: 50%;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 2;
}

/* PETALOS */
.petal {
  position: absolute;
  width: 14px;
  height: 30px;
  background: linear-gradient(#ffd54f, #ffb300);
  border-radius: 50%;
  top: 50%;
  left: 50%;
  transform-origin: center -10px;
}

/* 12 pétalos */
.petal:nth-child(1) { transform: translate(-50%, -50%) rotate(0deg); }
.petal:nth-child(2) { transform: translate(-50%, -50%) rotate(30deg); }
.petal:nth-child(3) { transform: translate(-50%, -50%) rotate(60deg); }
.petal:nth-child(4) { transform: translate(-50%, -50%) rotate(90deg); }
.petal:nth-child(5) { transform: translate(-50%, -50%) rotate(120deg); }
.petal:nth-child(6) { transform: translate(-50%, -50%) rotate(150deg); }
.petal:nth-child(7) { transform: translate(-50%, -50%) rotate(180deg); }
.petal:nth-child(8) { transform: translate(-50%, -50%) rotate(210deg); }
.petal:nth-child(9) { transform: translate(-50%, -50%) rotate(240deg); }
.petal:nth-child(10){ transform: translate(-50%, -50%) rotate(270deg); }
.petal:nth-child(11){ transform: translate(-50%, -50%) rotate(300deg); }
.petal:nth-child(12){ transform: translate(-50%, -50%) rotate(330deg); }

/* ANIMACION ORBITA */
.orbit {
  position: absolute;
  top: 50%;
  left: 50%;
  animation: spin linear infinite;
}

@keyframes spin {
  from { transform: rotate(0deg) translateX(var(--radius)) rotate(0deg); }
  to   { transform: rotate(360deg) translateX(var(--radius)) rotate(-360deg); }
}
</style>
</head>

<body>

<div class="galaxy" id="galaxy"></div>

<script>
const galaxy = document.getElementById("galaxy");

/* CREAR GIRASOL */
function createSunflower() {
  const flower = document.createElement("div");
  flower.className = "sunflower";

  const center = document.createElement("div");
  center.className = "center";
  flower.appendChild(center);

  for (let i = 0; i < 12; i++) {
    const petal = document.createElement("div");
    petal.className = "petal";
    flower.appendChild(petal);
  }

  return flower;
}

/* CREAR ORBITAS */
for (let i = 0; i < 20; i++) {
  const orbit = document.createElement("div");
  orbit.className = "orbit";

  let radius = 100 + i * 40;

  orbit.style.setProperty("--radius", radius + "px");
  orbit.style.animationDuration = (10 + i * 2) + "s";

  const sunflower = createSunflower();
  orbit.appendChild(sunflower);

  galaxy.appendChild(orbit);
}

/* MOVIMIENTO INTERACTIVO */
let posX = 0;
let posY = 0;

function moveGalaxy(x, y) {
  posX += (x - posX) * 0.05;
  posY += (y - posY) * 0.05;

  galaxy.style.transform =
    `translate(calc(-50% + ${posX}px), calc(-50% + ${posY}px))`;
}

/* MOUSE */
document.addEventListener("mousemove", (e) => {
  let x = (e.clientX - window.innerWidth / 2) / 20;
  let y = (e.clientY - window.innerHeight / 2) / 20;
  moveGalaxy(x, y);
});

/* TOUCH (CELULAR) */
document.addEventListener("touchmove", (e) => {
  let touch = e.touches[0];
  let x = (touch.clientX - window.innerWidth / 2) / 15;
  let y = (touch.clientY - window.innerHeight / 2) / 15;
  moveGalaxy(x, y);
});
</script>

</body>
</html>
