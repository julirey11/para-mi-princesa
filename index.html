<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Girasoles Animados</title>

<style>
body {
  margin: 0;
  height: 100vh;
  background: #111;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
}

/* CONTENEDOR */
.container {
  position: relative;
  width: 300px;
  height: 300px;
}

/* GIRASOL */
.sunflower {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}

/* PETALOS */
.petal {
  position: absolute;
  width: 60px;
  height: 120px;
  background: gold;
  border-radius: 50%;
  transform-origin: bottom center;
  box-shadow: 0 0 10px rgba(255, 215, 0, 0.6);
}

/* CENTRO */
.center {
  position: absolute;
  width: 80px;
  height: 80px;
  background: #5c3b1e;
  border-radius: 50%;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 10; /* SIEMPRE ENCIMA */
  box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
}

/* ANIMACION */
@keyframes spin {
  from { transform: translate(-50%, -50%) rotate(0deg); }
  to { transform: translate(-50%, -50%) rotate(360deg); }
}

.sunflower {
  animation: spin 10s linear infinite;
}

/* RESPONSIVE (celular) */
@media (max-width: 500px) {
  .container {
    width: 220px;
    height: 220px;
  }

  .petal {
    width: 40px;
    height: 90px;
  }

  .center {
    width: 60px;
    height: 60px;
  }
}
</style>
</head>

<body>

<div class="container">
  <div class="sunflower" id="flower"></div>
</div>

<script>
const flower = document.getElementById("flower");

const petals = 16; // cantidad de pétalos

for (let i = 0; i < petals; i++) {
  const petal = document.createElement("div");
  petal.classList.add("petal");

  const angle = (360 / petals) * i;

  petal.style.transform = `rotate(${angle}deg) translateY(-100px)`;

  flower.appendChild(petal);
}

// centro encima
const center = document.createElement("div");
center.classList.add("center");
flower.appendChild(center);
</script>

</body>
</html>
